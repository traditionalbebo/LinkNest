<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>traditionalbebo — Product Links</title>
<meta name="description" content="Honest reviews · Affordable fashion & beauty finds from Meesho, Nykaa & more">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #faf7f2; color: #1a1612; min-height: 100vh; }

  /* HEADER */
  .pub-header { background: #fff; border-bottom: 1px solid #e8e0d0; padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 50; }
  .pub-logo { font-family: 'DM Serif Display', serif; font-size: 17px; color: #1a1612; display: flex; align-items: center; gap: 7px; }
  .pub-logo-dot { width: 7px; height: 7px; background: #c4603a; border-radius: 50%; display: inline-block; }

  .pub-wrap { max-width: 560px; margin: 0 auto; padding: 36px 16px 60px; }

  /* PROFILE */
  .profile { text-align: center; margin-bottom: 32px; }
  .profile-avatar { width: 76px; height: 76px; border-radius: 50%; background: linear-gradient(135deg, #c4603a, #e8845e); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 20px rgba(196,96,58,0.25); }
  .profile-name { font-family: 'DM Serif Display', serif; font-size: 24px; color: #1a1612; margin-bottom: 6px; }
  .profile-bio { font-size: 13px; color: #a89e93; line-height: 1.7; }
  .profile-tags { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
  .profile-tag { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; background: #fff; border: 1px solid #e8e0d0; color: #6b6158; }

  /* FOLDER TILES */
  .folders-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .folder-tile { background: #fff; border: 1px solid #e8e0d0; border-radius: 14px; padding: 16px 14px 12px; cursor: pointer; transition: box-shadow .18s, transform .18s; position: relative; overflow: hidden; }
  .folder-tile::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--fc, #c4603a); opacity: 0.7; }
  .folder-tile:hover { box-shadow: 0 6px 20px rgba(26,22,18,0.1); transform: translateY(-2px); }
  .folder-tile:active { transform: translateY(0); }
  .folder-tile-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .folder-tile-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .folder-tile-arrow { font-size: 20px; font-weight: 300; opacity: 0.5; margin-top: 2px; }
  .folder-tile-name { font-size: 13px; font-weight: 600; color: #1a1612; line-height: 1.3; margin-bottom: 3px; }
  .folder-tile-count { font-size: 11px; color: #a89e93; }
  .folder-tile-thumbs { display: flex; gap: 3px; margin-top: 9px; }
  .folder-tile-thumb { width: 28px; height: 28px; border-radius: 5px; object-fit: cover; border: 1px solid #e8e0d0; }
  .folder-tile-thumb-more { width: 28px; height: 28px; border-radius: 5px; background: #f4f0e8; border: 1px solid #e8e0d0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: #a89e93; }

  /* BACK BUTTON */
  .back-to-folders { display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: #6b6158; background: #fff; border: 1px solid #e8e0d0; border-radius: 40px; padding: 7px 16px; cursor: pointer; margin-bottom: 20px; transition: all .15s; }
  .back-to-folders:hover { background: #f4f0e8; color: #1a1612; }

  /* FOLDER HEADING */
  .folder-heading { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e8e0d0; }
  .folder-heading-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .folder-heading-name { font-size: 15px; font-weight: 600; color: #1a1612; }
  .folder-heading-count { font-size: 11px; color: #a89e93; margin-top: 2px; }

  /* ==========================================
     PRODUCT GRID — 4 columns square
     ========================================== */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .product-tile {
    display: flex;
    flex-direction: column;
    background: #fff;
    border: 1px solid #e8e0d0;
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: box-shadow .18s, transform .15s;
    cursor: pointer;
  }

  .product-tile:hover {
    box-shadow: 0 4px 16px rgba(26,22,18,0.12);
    transform: translateY(-2px);
  }

  /* Square media area */
  .product-tile-media {
    width: 100%;
    aspect-ratio: 1 / 1;
    position: relative;
    overflow: hidden;
    background: #f4f0e8;
    flex-shrink: 0;
  }

  .product-tile-media img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .product-tile-media video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* play badge over video */
  .play-badge {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 28px; height: 28px;
    background: rgba(0,0,0,0.52);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }

  .play-badge::after {
    content: '';
    display: block;
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 10px solid #fff;
    margin-left: 2px;
  }

  /* placeholder when no media */
  .product-tile-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    background: #f4f0e8;
  }

  /* Info below media */
  .product-tile-info {
    padding: 7px 7px 8px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .product-tile-name {
    font-size: 11px;
    font-weight: 500;
    color: #1a1612;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .product-tile-price {
    font-size: 11px;
    font-weight: 600;
    color: #c4603a;
  }

  .product-tile-link {
    font-size: 10px;
    color: #a89e93;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .product-tile-buy {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 0;
    border-radius: 6px;
    margin-top: 3px;
    color: #fff;
    background: #1a1612;
    letter-spacing: .02em;
  }

  /* PLATFORM COLOURS */
  .p-meesho { background: #fde8f7; color: #8b1a6b; }
  .p-nykaa  { background: #ffedf2; color: #c4154a; }
  .p-amazon { background: #fff3e0; color: #c45500; }
  .p-myntra { background: #fff0f0; color: #d03060; }
  .p-flipkart { background: #e8f0fe; color: #1a5ce6; }
  .p-other  { background: #f4f0e8; color: #6b6158; }

  .product-tile-platform {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 20px;
    display: inline-block;
    align-self: flex-start;
  }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: #a89e93; }
  .empty-emoji { font-size: 36px; margin-bottom: 12px; }
  .empty-msg { font-size: 14px; }

  /* FOOTER */
  .pub-footer { text-align: center; padding: 28px 20px; border-top: 1px solid #e8e0d0; margin-top: 20px; }
  .pub-footer-text { font-size: 12px; color: #a89e93; line-height: 1.8; }
  .affiliate-note { display: inline-block; font-size: 11px; color: #a89e93; background: #f4f0e8; padding: 4px 12px; border-radius: 20px; margin-top: 8px; }

  /* RESPONSIVE */
  @media (max-width: 400px) {
    .products-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .folders-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 280px) {
    .products-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header class="pub-header">
  <div class="pub-logo"><span class="pub-logo-dot"></span>LinkNest</div>
</header>

<div class="pub-wrap">
  <div class="profile">
    <div class="profile-avatar">✨</div>
    <div class="profile-name">traditionalbebo</div>
    <div class="profile-bio">Honest reviews · Affordable fashion & beauty finds<br>from Meesho, Nykaa & more</div>
    <div class="profile-tags">
      <span class="profile-tag">Ethnic Fashion</span>
      <span class="profile-tag">Beauty</span>
      <span class="profile-tag">Affordable Finds</span>
    </div>
  </div>

  <div id="content"></div>

  <div class="pub-footer">
    <div class="pub-footer-text">Updated regularly with new finds</div>
    <div class="affiliate-note">All links may be affiliate links</div>
  </div>
</div>

<script>
const PL = { nykaa:'Nykaa', meesho:'Meesho', amazon:'Amazon', myntra:'Myntra', flipkart:'Flipkart', other:'Other' };
const PC = { nykaa:'p-nykaa', meesho:'p-meesho', amazon:'p-amazon', myntra:'p-myntra', flipkart:'p-flipkart', other:'p-other' };

const folders   = JSON.parse(localStorage.getItem('linknest_folders') || '[]');
const links     = JSON.parse(localStorage.getItem('linknest_links')   || '[]');
const populated = folders.filter(f => links.some(l => l.folderId === f.id));
const el        = document.getElementById('content');

function mediaThumb(l) {
  if (!l.media) return '';
  if (l.mediaType === 'video') return `<img src="${l.mediaPoster || ''}" style="width:100%;height:100%;object-fit:cover;display:${l.mediaPoster?'block':'none'};">`;
  return `<img src="${l.media}" style="width:100%;height:100%;object-fit:cover;display:block;" alt="">`;
}

function showFolders() {
  if (!populated.length) {
    el.innerHTML = `<div class="empty"><div class="empty-emoji">🛍️</div><div class="empty-msg">No products yet — check back soon!</div></div>`;
    return;
  }
  el.innerHTML = `<div class="folders-grid">
    ${populated.map(f => {
      const fl = links.filter(l => l.folderId === f.id);
      const withMedia = fl.filter(l => l.media && l.mediaType === 'photo').slice(0, 3);
      const thumbsHtml = withMedia.length
        ? `<div class="folder-tile-thumbs">
            ${withMedia.map(l => `<img src="${l.media}" class="folder-tile-thumb" alt="">`).join('')}
            ${fl.length > withMedia.length ? `<div class="folder-tile-thumb-more">+${fl.length - withMedia.length}</div>` : ''}
           </div>` : '';
      return `
        <div class="folder-tile" onclick="showProducts('${f.id}')" style="--fc:${f.color};">
          <div class="folder-tile-top">
            <div class="folder-tile-icon" style="background:${f.color}18;">${f.icon}</div>
            <div class="folder-tile-arrow" style="color:${f.color};">›</div>
          </div>
          <div class="folder-tile-name">${f.name}</div>
          <div class="folder-tile-count">${fl.length} product${fl.length !== 1 ? 's' : ''}</div>
          ${thumbsHtml}
        </div>`;
    }).join('')}
  </div>`;
}

function showProducts(folderId) {
  const f  = folders.find(f => f.id === folderId);
  const fl = links.filter(l => l.folderId === folderId);

  const tiles = fl.map(l => {
    // media square
    let mediaHtml = '';
    if (l.media && l.mediaType === 'photo') {
      mediaHtml = `<div class="product-tile-media"><img src="${l.media}" alt="${l.name}"></div>`;
    } else if (l.media && l.mediaType === 'video') {
      const posterAttr = l.mediaPoster ? `poster="${l.mediaPoster}"` : '';
      mediaHtml = `
        <div class="product-tile-media">
          <video ${posterAttr} muted playsinline loop preload="none"
            onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"
            ontouchstart="this.play()">
            <source src="${l.media}" type="video/mp4">
          </video>
          <div class="play-badge"></div>
        </div>`;
    } else {
      mediaHtml = `<div class="product-tile-media"><div class="product-tile-placeholder">${f.icon}</div></div>`;
    }

    return `
      <a href="${l.url}" target="_blank" rel="noopener" class="product-tile">
        ${mediaHtml}
        <div class="product-tile-info">
          <div class="product-tile-name">${l.name}</div>
          ${l.price ? `<div class="product-tile-price">${l.price}</div>` : ''}
          <span class="product-tile-platform ${PC[l.platform]||'p-other'}">${PL[l.platform]||'Other'}</span>
          <div class="product-tile-buy">Shop now →</div>
        </div>
      </a>`;
  }).join('');

  el.innerHTML = `
    <div>
      <button class="back-to-folders" onclick="showFolders()">← All Collections</button>
      <div class="folder-heading">
        <div class="folder-heading-icon" style="background:${f.color}18;">${f.icon}</div>
        <div>
          <div class="folder-heading-name">${f.name}</div>
          <div class="folder-heading-count">${fl.length} product${fl.length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="products-grid">${tiles}</div>
    </div>`;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

showFolders();
</script>
</body>
</html>
